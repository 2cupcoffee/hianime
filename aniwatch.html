<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HiAnime Free Anime Streaming Homepage</title>
    <!--favicon-->
    <link rel="icon" type="image/x-icon" href="headericons/download.jpg" />
    <!--css-->
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/hianime.css" />
    <!-- Font Awesome -->
    <script
      src="https://kit.fontawesome.com/54148970dd.js"
      crossorigin="anonymous"
    ></script>
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header id="header">
      <div class="header-container">
        <div class="hamburger-menu">
          <i
            class="fa-solid fa-bars"
            style="color: #ffffff; font-size: 25px"
          ></i>
        </div>
        <div class="logo">
          <img class="logo-img" src="headericons/hianime.png" />
        </div>
        <div class="search-container">
          <input class="search-bar" type="text" placeholder="Search anime..." />
          <button class="search-button">
            <i
              class="fa-solid fa-magnifying-glass"
              style="color: #000000; font-size: 16px; background-color: white"
            ></i>
          </button>
          <button class="filter">Filter</button>
        </div>
        <div class="socials">
          <div class="join">
            <p class="join-text">Join<br />now</p>
          </div>
          <div class="social-icons">
            <img class="dc" src="headericons/discord-v2-svgrepo-com.svg" />
            <img class="tg" src="headericons/telegram-svgrepo-com.svg" />
            <img class="reddit" src="headericons/reddit.svg" />
            <img class="twitter" src="headericons/twitter.svg" />
          </div>
        </div>
        <div class="user-container">
          <div class="signal">
            <div class="signal-icon">
              <i
                class="fa-solid fa-wifi"
                style="color: #ffbade; font-size: 20px"
              ></i>
            </div>
            <p class="user-text">Watch2gether</p>
          </div>
          <div class="shuffle">
            <div class="shuffle-icon">
              <i
                class="fa-solid fa-shuffle"
                style="color: #ffbade; font-size: 20px"
              ></i>
            </div>
            <p class="user-text">Random</p>
          </div>
          <div class="toggle">
            <div class="toggle-icon">
              <button class="en">EN</button>
              <button class="jp">JP</button>
            </div>
            <p class="user-text">Anime Name</p>
          </div>
          <div class="community">
            <div class="community-icon">
              <i
                class="fa-solid fa-comments"
                style="color: #ffbade; font-size: 20px"
              ></i>
            </div>
            <p class="user-text">Community</p>
          </div>
        </div>
      </div>
      <div class="login-container">
        <button class="search-right">
          <i
            class="fa-solid fa-magnifying-glass"
            style="color: #fff; font-size: 25px"
          ></i>
        </button>
        <button class="login">Login</button>
      </div>
    </header>
    <main id="main-content">
      <div class="anime-previews">
        <div class="anime-images">
          <img class="slideshow" src="previews/sololeveling.jpg" />
        </div>
        <div class="sliders">
          <button>
            <i
              class="sl fa-solid fa-greater-than"
              style="color: #ffffff; font-size: 25px"
            ></i>
          </button>
          <button>
            <i
              class="sl fa-solid fa-less-than"
              style="color: #ffffff; font-size: 20px"
            ></i>
          </button>
        </div>
        <div class="anime-info">
          <p class="spotlight">#4 Spotlight</p>
          <h1 class="title">
            Solo Leveling season 2: Arise<br />
            from the Shadow
          </h1>
          <div class="ep-buttons">
            <div class="ep-container">
              <button class="ep-icon">
                <i
                  class="fa-solid fa-circle-play epb"
                  style="color: #ffffff"
                ></i>
              </button>
              <p class="ep-text">TV</p>
            </div>
            <div class="ep-container">
              <button class="ep-icon">
                <i class="fa-solid fa-clock epb" style="color: #ffffff"></i>
              </button>
              <p class="ep-text">24m</p>
            </div>
            <div class="ep-container">
              <button class="ep-icon">
                <i class="fa-solid fa-calendar epb" style="color: #ffffff"></i>
              </button>
              <p class="ep-text">Jan 5, 2025</p>
            </div>
            <div class="abt-button">
              <button class="hd abt">HD</button>
              <button class="cc abt">
                <i
                  class="fa-solid fa-closed-captioning"
                  style="color: #000000; font-size: 10px"
                ></i>
                <p>8</p>
              </button>
              <button class="mic abt">
                <i class="fa-solid fa-microphone" style="color: #000000"></i>
                <p>6</p>
              </button>
              <button class="age abt">13</button>
            </div>
          </div>
          <p class="anime-description">Second season of solo leveling.</p>
          <div class="decision">
            <button class="watchnow">
              <i class="fa-solid fa-circle-play" style="color: #000000"></i>
              <p>Watch Now</p>
            </button>
            <button class="details">
              <p>Detail</p>
              <i class="fa-solid fa-greater-than"></i>
            </button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
